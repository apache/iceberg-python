name: "Python CI - Polaris"

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - 'pyiceberg/**'
      - 'tests/**'
      - 'dev/docker-compose-polaris.yml'
      - 'dev/test-polaris.sh'
      - '.github/workflows/python-ci-polaris.yml'
      - 'Makefile'
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  polaris-integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install UV
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev # for kerberos
      - name: Install
        run: make install
      - name: Run Polaris integration tests
        run: make test-polaris
      - name: Show debug logs
        if: ${{ failure() }}
        run: docker compose -f dev/docker-compose-polaris.yml logs
