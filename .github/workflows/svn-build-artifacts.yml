name: "Build SVN Artifacts"

on:
  workflow_call:
    inputs:
      VERSION:
        required: true
        type: string

permissions:
  contents: read

jobs:
  svn-build-artifacts:
    name: Build artifacts for SVN on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 15
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15-intel, macos-latest ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Install UV
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      # Publish the source distribution with the version that's in
      # the repository, otherwise the tests will fail
      - name: Compile source distribution
        run: uv build --sdist
        if: matrix.os == 'ubuntu-latest'

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          output-dir: wheelhouse
          config-file: "pyproject.toml"
        env:
          # Ignore 32 bit architectures
          CIBW_ARCHS: "auto64"
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.10,<3.15"
          CIBW_BEFORE_TEST: "uv sync --directory {project} --only-group dev --no-install-project"
          CIBW_TEST_COMMAND: "uv run --directory {project} pytest tests/avro/test_decoder.py"
          CIBW_FREE_THREADED_SUPPORT: "true"

      - name: Add source distribution
        if: matrix.os == 'ubuntu-latest'
        run: ls -lah dist/* && cp dist/* wheelhouse/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "svn-release-candidate-${{ matrix.os }}"
          path: ./wheelhouse/*

  svn-merge-artifacts:
    runs-on: ubuntu-latest
    needs:
      - svn-build-artifacts
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: "svn-release-candidate-${{ inputs.VERSION }}"
          pattern: svn-release-candidate*
          delete-merged: true
